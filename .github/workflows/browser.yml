name: Browser CI

# Build + unit tests, AND a per-PR Cloud Run preview for services/browser.
# Ported from neonbinder_browser/browser-deploy.yml (deploy-preview +
# preview-login-probe + comment-preview). The push-to-main prod deploy
# pipeline (build-push / deploy-dev / dev-promote / deploy-prod) is NOT here —
# that lands at cutover (step D). This lane only stands up + validates the
# per-PR preview so the web E2E can run against the PR's OWN browser code.
#
# WIF: the dev provider now trusts neonbinder/neonbinder (NEO-18 terraform
# change, neonbinder_ioc#25). GCP_WIF_PROVIDER_DEV / GCP_SERVICE_ACCOUNT_DEPLOYER_DEV
# are set on this repo.

on:
  pull_request:
    paths:
      - "services/browser/**"
  push:
    branches: [main]
    paths:
      - "services/browser/**"
  workflow_dispatch:

concurrency:
  # PRs: group per-PR and cancel in-flight so rapid pushes don't stack up
  # redundant preview builds. main/dispatch: group per-ref without cancel.
  group: browser-ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    working-directory: services/browser

jobs:
  test:
    name: Build + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: services/browser/.nvmrc
          cache: npm
          cache-dependency-path: services/browser/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  # ---------------------------------------------------------------------------
  # Per-PR preview: each PR gets a stable `pr-<N>` tagged, NO-TRAFFIC revision
  # on the dev Cloud Run service. Traffic-serving dev (main's HEAD) is
  # untouched. The deterministic tagged URL
  #   https://pr-<N>---neonbinder-browser-xxlo66yxuq-uc.a.run.app
  # is what apps/web's vercel-build.sh points the Convex preview's
  # NEONBINDER_BROWSER_URL at, so the web E2E exercises THIS PR's browser code.
  # Fork PRs are skipped (no WIF/OIDC access). Teardown: a cutover follow-up
  # (port preview-cleanup.yml on pull_request: closed).
  # ---------------------------------------------------------------------------
  deploy-preview:
    name: Deploy per-PR Cloud Run preview
    needs: test
    if: |
      github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    outputs:
      preview_url: ${{ steps.capture.outputs.preview_url }}
      preview_tag: ${{ steps.capture.outputs.preview_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push Docker image
        env:
          IMAGE: gcr.io/neonbinder-dev/neonbinder-browser
          PR_NUMBER: ${{ github.event.pull_request.number }}
        # cwd = services/browser (job default); Dockerfile.prod + context live here.
        run: |
          docker build -f Dockerfile.prod -t "$IMAGE:pr-$PR_NUMBER" .
          docker push "$IMAGE:pr-$PR_NUMBER"

      - name: Deploy tagged no-traffic preview to dev Cloud Run
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522 # v2
        with:
          service: neonbinder-browser
          region: us-central1
          image: gcr.io/neonbinder-dev/neonbinder-browser:pr-${{ github.event.pull_request.number }}
          project_id: neonbinder-dev
          env_vars: ENVIRONMENT=dev
          no_traffic: true
          tag: pr-${{ github.event.pull_request.number }}

      - id: capture
        name: Capture preview URL
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          TAG="pr-$PR"
          TAGGED_URL=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder-dev \
            --format=json \
            | jq -r ".status.traffic[] | select(.tag == \"$TAG\") | .url")
          if [ -z "$TAGGED_URL" ] || [ "$TAGGED_URL" = "null" ]; then
            echo "ERROR: preview URL for tag=$TAG not found on service."
            exit 1
          fi
          echo "preview_url=$TAGGED_URL" >> "$GITHUB_OUTPUT"
          echo "preview_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $TAGGED_URL"

  # Real BSC + SportLots login round-trip against the tagged preview revision.
  # This is the dedicated browser-service e2e check (tests/integration/*.test.mjs
  # via test:prod-gate) that was missing in the monorepo CI — it catches auth
  # regressions in the PR's own browser code before the web E2E even runs.
  preview-login-probe:
    name: Preview login probe (BSC + SportLots)
    needs: deploy-preview
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: services/browser/.nvmrc
          cache: npm
          cache-dependency-path: services/browser/package-lock.json
      - run: npm ci

      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      # Cloud Run validates the OIDC token's audience against the *base* service
      # URL even when the request targets the tag-prefixed host. Capture the base.
      - id: base-url
        name: Capture base service URL (token audience)
        run: |
          set -euo pipefail
          BASE_URL=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder-dev \
            --format='value(status.url)')
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      # Mint a Google OIDC ID token as the deployer SA (holds run.invoker via
      # Terraform deployer_invoker), audience = base service URL.
      - id: probe-token
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}
          token_format: id_token
          id_token_audience: ${{ steps.base-url.outputs.base_url }}
          id_token_include_email: true

      - name: Run integration login suite against preview
        env:
          TARGET_URL: ${{ needs.deploy-preview.outputs.preview_url }}
          PROBE_ID_TOKEN: ${{ steps.probe-token.outputs.id_token }}
          BSC_USERNAME: ${{ secrets.MAESTRO_BSC_USERNAME }}
          BSC_PASSWORD: ${{ secrets.MAESTRO_BSC_PASSWORD }}
          SPORTLOTS_USERNAME: ${{ secrets.MAESTRO_SPORTLOTS_USERNAME }}
          SPORTLOTS_PASSWORD: ${{ secrets.MAESTRO_SPORTLOTS_PASSWORD }}
        run: npm run test:prod-gate

  # Sticky PR comment with the preview URL + probe result, always posted so a
  # failure still leaves a trace on the PR.
  comment-preview:
    name: Comment preview URL
    needs: [deploy-preview, preview-login-probe]
    if: |
      always()
      && github.event_name == 'pull_request'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # This job does not checkout (only gh-api calls), so override the workflow's
    # services/browser working-directory — that path doesn't exist here.
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Sticky preview comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          URL: ${{ needs.deploy-preview.outputs.preview_url }}
          TAG: ${{ needs.deploy-preview.outputs.preview_tag }}
          DEPLOY_RESULT: ${{ needs.deploy-preview.result }}
          PROBE_RESULT: ${{ needs.preview-login-probe.result }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          status() {
            case "$1" in
              success) echo "PASS" ;;
              failure) echo "FAIL" ;;
              cancelled) echo "CANCELLED" ;;
              skipped) echo "skipped" ;;
              *) echo "$1" ;;
            esac
          }
          URL_LINE="not deployed — see workflow run"
          if [ "$DEPLOY_RESULT" = "success" ] && [ -n "$URL" ]; then URL_LINE="$URL"; fi
          cat > /tmp/body.md <<EOF
          <!-- neonbinder-browser-preview-marker -->
          ## Browser service preview

          **URL:** $URL_LINE
          **Tag:** \`$TAG\`

          **Checks**
          - Deploy: $(status "$DEPLOY_RESULT")
          - Login probe (BSC + SportLots): $(status "$PROBE_RESULT")

          The web E2E on this PR runs against this preview (NEONBINDER_BROWSER_URL is pointed at the tagged URL). [Workflow run]($RUN_URL)
          EOF
          EXISTING=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq '.[] | select(.body | contains("neonbinder-browser-preview-marker")) | .id' | head -n 1)
          if [ -n "$EXISTING" ]; then
            gh api --method PATCH "repos/$REPO/issues/comments/$EXISTING" -f body="$(cat /tmp/body.md)" > /dev/null
            echo "Updated sticky comment $EXISTING."
          else
            gh api --method POST "repos/$REPO/issues/$PR/comments" -f body="$(cat /tmp/body.md)" > /dev/null
            echo "Created sticky comment."
          fi

  # ===========================================================================
  # POST-MERGE PROD DEPLOY LANE (NEO-18 Phase 3)
  # Ported from neonbinder_browser/browser-deploy.yml. Build-once → blue/green
  # (land at 0% traffic under a `sha-<short>` tag → real BSC+SportLots
  # login-probe → promote to 100%), dev then prod. NO smoke (the login-probe IS
  # the gate) and NO convex-dev-gate — the web E2E is the PRE-MERGE gate
  # (pr-pipeline.yml), so this post-merge lane never re-runs the web E2E.
  #
  # DORMANT until cutover: the traffic-promoting + prod jobs run ONLY on `push`
  # to main with the repo variable `BROWSER_DEPLOY_ENABLED == 'true'`. Until then
  # a merge to main runs only `test` — no deploy, no traffic shift, no dual-write
  # of the shared Cloud Run service while the old neonbinder_browser repo is
  # still the live deploy source. At cutover: set the variable AND stop the old
  # repo's deploys (CUTOVER.md step D).
  #
  # `workflow_dispatch` validates the SAFE half pre-cutover (build-push +
  # deploy-dev at 0% traffic + dev-login-probe); promotes + all prod jobs stay
  # off on dispatch, and build-push skips the prod-GCR push on dispatch.
  # ===========================================================================

  build-push:
    name: Build + push image (dev + prod GCR)
    needs: test
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && vars.BROWSER_DEPLOY_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    outputs:
      short_sha: ${{ steps.short.outputs.short_sha }}
      deploy_tag: ${{ steps.short.outputs.deploy_tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: short
        name: Compute sha tag
        run: |
          SHORT="$(echo "$GITHUB_SHA" | cut -c1-7)"
          echo "short_sha=$SHORT" >> "$GITHUB_OUTPUT"
          echo "deploy_tag=sha-$SHORT" >> "$GITHUB_OUTPUT"

      - name: Auth to dev
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Configure Docker for GCR (dev)
        run: gcloud auth configure-docker --quiet

      - name: Build + push to dev GCR
        # cwd = services/browser (workflow default); Dockerfile.prod + context here.
        env:
          SHA: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.prod \
            -t gcr.io/neonbinder-dev/neonbinder-browser:$SHA \
            -t gcr.io/neonbinder-dev/neonbinder-browser:latest \
            .
          docker push gcr.io/neonbinder-dev/neonbinder-browser:$SHA
          docker push gcr.io/neonbinder-dev/neonbinder-browser:latest

      # Prod-GCR retag only on a real (enabled) push — a dispatch validation
      # stays dev-only and never touches the prod registry.
      - name: Re-auth to prod
        if: github.event_name == 'push'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}

      - name: Configure Docker for GCR (prod)
        if: github.event_name == 'push'
        run: gcloud auth configure-docker --quiet

      - name: Retag + push to prod GCR (same image bytes)
        if: github.event_name == 'push'
        env:
          SHA: ${{ github.sha }}
        run: |
          docker tag gcr.io/neonbinder-dev/neonbinder-browser:$SHA gcr.io/neonbinder/neonbinder-browser:$SHA
          docker tag gcr.io/neonbinder-dev/neonbinder-browser:$SHA gcr.io/neonbinder/neonbinder-browser:latest
          docker push gcr.io/neonbinder/neonbinder-browser:$SHA
          docker push gcr.io/neonbinder/neonbinder-browser:latest

  # Dev blue/green: land the new image at 0% traffic under the sha tag. Live dev
  # keeps serving the prior revision until dev-promote.
  deploy-dev:
    name: Deploy dev (no-traffic, sha tag)
    needs: build-push
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && vars.BROWSER_DEPLOY_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # No checkout — override the workflow's services/browser working-dir so the
    # gcloud run steps don't fail on a missing directory.
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: read
      id-token: write
    outputs:
      new_revision: ${{ steps.capture-new.outputs.new_revision }}
      tagged_url: ${{ steps.capture-new.outputs.tagged_url }}
      prev_revision: ${{ steps.capture-prev.outputs.prev_revision }}
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - id: capture-prev
        name: Capture dev's currently-serving revision
        run: |
          PREV=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 --project=neonbinder-dev \
            --format='value(status.traffic[0].revisionName)')
          echo "Previous dev revision: $PREV"
          echo "prev_revision=$PREV" >> "$GITHUB_OUTPUT"
      - name: Deploy to dev Cloud Run (no_traffic + sha tag)
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522 # v2
        with:
          service: neonbinder-browser
          region: us-central1
          image: gcr.io/neonbinder-dev/neonbinder-browser:${{ github.sha }}
          project_id: neonbinder-dev
          env_vars: ENVIRONMENT=dev
          no_traffic: true
          tag: ${{ needs.build-push.outputs.deploy_tag }}
          # Pin warm-instance scaling: Terraform sets minScale=1 but ignores
          # changes, so a deploy without these reverts to cold-start.
          flags: '--min-instances=1 --max-instances=20'
      - id: capture-new
        name: Capture new dev revision + tagged URL
        env:
          TAG: ${{ needs.build-push.outputs.deploy_tag }}
        run: |
          set -euo pipefail
          NEW=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 --project=neonbinder-dev \
            --format='value(status.latestCreatedRevisionName)')
          TAGGED_URL=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 --project=neonbinder-dev --format=json \
            | jq -r ".status.traffic[] | select(.tag == \"$TAG\") | .url")
          if [ -z "$TAGGED_URL" ] || [ "$TAGGED_URL" = "null" ]; then
            echo "ERROR: tagged URL for tag=$TAG not found."; exit 1
          fi
          echo "new_revision=$NEW" >> "$GITHUB_OUTPUT"
          echo "tagged_url=$TAGGED_URL" >> "$GITHUB_OUTPUT"

  # Real BSC + SportLots login round-trip against the dev tagged revision
  # (catches auth regressions before any traffic shift).
  dev-login-probe:
    name: Dev login probe (BSC + SportLots)
    needs: deploy-dev
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && vars.BROWSER_DEPLOY_ENABLED == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: services/browser/.nvmrc
          cache: npm
          cache-dependency-path: services/browser/package-lock.json
      - run: npm ci
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      # Cloud Run validates the OIDC audience against the BASE service URL even
      # when the request targets the tagged host.
      - id: base-url
        name: Capture base service URL (token audience)
        run: |
          set -euo pipefail
          BASE_URL=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 --project=neonbinder-dev \
            --format='value(status.url)')
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
      - id: probe-token
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}
          token_format: id_token
          id_token_audience: ${{ steps.base-url.outputs.base_url }}
          id_token_include_email: true
      - name: Run login suite against dev tagged URL
        working-directory: services/browser
        env:
          TARGET_URL: ${{ needs.deploy-dev.outputs.tagged_url }}
          PROBE_ID_TOKEN: ${{ steps.probe-token.outputs.id_token }}
          BSC_USERNAME: ${{ secrets.MAESTRO_BSC_USERNAME }}
          BSC_PASSWORD: ${{ secrets.MAESTRO_BSC_PASSWORD }}
          SPORTLOTS_USERNAME: ${{ secrets.MAESTRO_SPORTLOTS_USERNAME }}
          SPORTLOTS_PASSWORD: ${{ secrets.MAESTRO_SPORTLOTS_PASSWORD }}
        run: npm run test:prod-gate

  # Shift 100% dev traffic to the new revision. Gated (enabled-push only) — never
  # on dispatch, so a validation dispatch can't move live dev traffic.
  dev-promote:
    name: Promote dev to 100%
    needs: [deploy-dev, dev-login-probe]
    if: github.event_name == 'push' && vars.BROWSER_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - name: Promote dev revision to 100%
        run: |
          set -euo pipefail
          gcloud run services update-traffic neonbinder-browser \
            --region=us-central1 --project=neonbinder-dev \
            --to-revisions="${{ needs.deploy-dev.outputs.new_revision }}=100"

  # Prod blue/green — only after dev is built, probed, and promoted. Same image
  # bytes (gcr.io/neonbinder/...:sha) built once in build-push.
  deploy-prod:
    name: Deploy prod (no-traffic, sha tag)
    needs: [build-push, dev-promote]
    if: github.event_name == 'push' && vars.BROWSER_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: read
      id-token: write
    outputs:
      new_revision: ${{ steps.capture-new.outputs.new_revision }}
      tagged_url: ${{ steps.capture-new.outputs.tagged_url }}
      prev_revision: ${{ steps.capture-prev.outputs.prev_revision }}
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - id: capture-prev
        name: Capture prod's currently-serving revision
        run: |
          PREV=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 --project=neonbinder \
            --format='value(status.traffic[0].revisionName)')
          echo "Previous prod revision: $PREV"
          echo "prev_revision=$PREV" >> "$GITHUB_OUTPUT"
      - name: Deploy to prod Cloud Run (no_traffic + sha tag)
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522 # v2
        with:
          service: neonbinder-browser
          region: us-central1
          image: gcr.io/neonbinder/neonbinder-browser:${{ github.sha }}
          project_id: neonbinder
          env_vars: ENVIRONMENT=prod
          no_traffic: true
          tag: ${{ needs.build-push.outputs.deploy_tag }}
          flags: '--min-instances=1 --max-instances=20'
      - id: capture-new
        name: Capture new prod revision + tagged URL
        env:
          TAG: ${{ needs.build-push.outputs.deploy_tag }}
        run: |
          set -euo pipefail
          NEW=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 --project=neonbinder \
            --format='value(status.latestCreatedRevisionName)')
          TAGGED_URL=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 --project=neonbinder --format=json \
            | jq -r ".status.traffic[] | select(.tag == \"$TAG\") | .url")
          if [ -z "$TAGGED_URL" ] || [ "$TAGGED_URL" = "null" ]; then
            echo "ERROR: tagged URL for tag=$TAG not found."; exit 1
          fi
          echo "new_revision=$NEW" >> "$GITHUB_OUTPUT"
          echo "tagged_url=$TAGGED_URL" >> "$GITHUB_OUTPUT"

  # The signal the dev probe can't give: prod env + prod Secret Manager + prod SA
  # actually authenticating to BSC + SportLots, against the prod tagged revision.
  prod-login-probe:
    name: Prod login probe (BSC + SportLots)
    needs: deploy-prod
    if: github.event_name == 'push' && vars.BROWSER_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: services/browser/.nvmrc
          cache: npm
          cache-dependency-path: services/browser/package-lock.json
      - run: npm ci
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - id: base-url
        name: Capture base service URL (token audience)
        run: |
          set -euo pipefail
          BASE_URL=$(gcloud run services describe neonbinder-browser \
            --region=us-central1 --project=neonbinder \
            --format='value(status.url)')
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"
      - id: probe-token
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}
          token_format: id_token
          id_token_audience: ${{ steps.base-url.outputs.base_url }}
          id_token_include_email: true
      - name: Run login suite against prod tagged URL
        working-directory: services/browser
        env:
          TARGET_URL: ${{ needs.deploy-prod.outputs.tagged_url }}
          PROBE_ID_TOKEN: ${{ steps.probe-token.outputs.id_token }}
          BSC_USERNAME: ${{ secrets.MAESTRO_BSC_USERNAME }}
          BSC_PASSWORD: ${{ secrets.MAESTRO_BSC_PASSWORD }}
          SPORTLOTS_USERNAME: ${{ secrets.MAESTRO_SPORTLOTS_USERNAME }}
          SPORTLOTS_PASSWORD: ${{ secrets.MAESTRO_SPORTLOTS_PASSWORD }}
        run: npm run test:prod-gate

  prod-promote:
    name: Promote prod to 100%
    needs: [deploy-prod, prod-login-probe]
    if: github.event_name == 'push' && vars.BROWSER_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - name: Promote prod revision to 100%
        run: |
          set -euo pipefail
          gcloud run services update-traffic neonbinder-browser \
            --region=us-central1 --project=neonbinder \
            --to-revisions="${{ needs.deploy-prod.outputs.new_revision }}=100"

  # Unified failure report (enabled-push only): opens an issue identifying the
  # first failed stage + its blast radius.
  report-failure:
    name: Report deploy failure
    needs: [test, build-push, deploy-dev, dev-login-probe, dev-promote, deploy-prod, prod-login-probe, prod-promote]
    if: |
      always() && github.event_name == 'push' && vars.BROWSER_DEPLOY_ENABLED == 'true' && (
        needs.test.result == 'failure' ||
        needs.build-push.result == 'failure' ||
        needs.deploy-dev.result == 'failure' ||
        needs.dev-login-probe.result == 'failure' ||
        needs.dev-promote.result == 'failure' ||
        needs.deploy-prod.result == 'failure' ||
        needs.prod-login-probe.result == 'failure' ||
        needs.prod-promote.result == 'failure'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    permissions:
      contents: read
      issues: write
    steps:
      - name: Open GitHub issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          R_TEST: ${{ needs.test.result }}
          R_BUILD: ${{ needs.build-push.result }}
          R_DEV: ${{ needs.deploy-dev.result }}
          R_DEV_PROBE: ${{ needs.dev-login-probe.result }}
          R_DEV_PROMOTE: ${{ needs.dev-promote.result }}
          R_PROD: ${{ needs.deploy-prod.result }}
          R_PROBE: ${{ needs.prod-login-probe.result }}
          R_PROMOTE: ${{ needs.prod-promote.result }}
          NEW_REV: ${{ needs.deploy-prod.outputs.new_revision }}
          TAG: ${{ needs.build-push.outputs.deploy_tag }}
          TAGGED_URL: ${{ needs.deploy-prod.outputs.tagged_url }}
          PROD_PREV: ${{ needs.deploy-prod.outputs.prev_revision }}
          DEV_PREV: ${{ needs.deploy-dev.outputs.prev_revision }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ "$R_TEST" = "failure" ]; then STAGE=test
          elif [ "$R_BUILD" = "failure" ]; then STAGE=build-push
          elif [ "$R_DEV" = "failure" ]; then STAGE=deploy-dev
          elif [ "$R_DEV_PROBE" = "failure" ]; then STAGE=dev-login-probe
          elif [ "$R_DEV_PROMOTE" = "failure" ]; then STAGE=dev-promote
          elif [ "$R_PROD" = "failure" ]; then STAGE=deploy-prod
          elif [ "$R_PROBE" = "failure" ]; then STAGE=prod-login-probe
          elif [ "$R_PROMOTE" = "failure" ]; then STAGE=prod-promote
          else STAGE=unknown
          fi
          case "$STAGE" in
            test|build-push)
              BLAST="No infra touched. Dev and prod both still serving their previous revisions." ;;
            deploy-dev|dev-login-probe)
              BLAST="Dev has a parked revision at 0% traffic; still serving \`$DEV_PREV\`. No promote. Prod never touched." ;;
            dev-promote)
              BLAST="Dev checks passed but the traffic shift failed; dev still serves \`$DEV_PREV\`. Prod never touched." ;;
            deploy-prod|prod-login-probe)
              BLAST="Dev serves HEAD. Prod has a parked revision at 0% traffic (\`$NEW_REV\`, tag \`$TAG\`); still serves \`$PROD_PREV\`. Tagged URL: $TAGGED_URL." ;;
            prod-promote)
              BLAST="Dev serves HEAD. Prod checks passed but the traffic shift failed. Re-run the promote / investigate update-traffic." ;;
            *)
              BLAST="Unknown failure mode — check the run directly." ;;
          esac
          cat > body.md <<EOF
          Browser deploy failed at **\`$STAGE\`** for commit ${{ github.sha }}.

          **Blast radius:** $BLAST

          | Stage | Result |
          |---|---|
          | test | \`$R_TEST\` |
          | build-push | \`$R_BUILD\` |
          | deploy-dev | \`$R_DEV\` |
          | dev-login-probe | \`$R_DEV_PROBE\` |
          | dev-promote | \`$R_DEV_PROMOTE\` |
          | deploy-prod | \`$R_PROD\` |
          | prod-login-probe | \`$R_PROBE\` |
          | prod-promote | \`$R_PROMOTE\` |

          [Deploy run]($RUN_URL)
          EOF
          gh issue create \
            --repo neonbinder/neonbinder \
            --title "Browser deploy failed at ${STAGE}: ${{ github.sha }}" \
            --body-file body.md

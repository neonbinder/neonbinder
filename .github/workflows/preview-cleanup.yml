name: Preview Cleanup

on:
  pull_request:
    types: [closed]

# When a PR closes (merged or not), tear down its per-PR previews:
#
#  1. cleanup            — browser preview on dev Cloud Run (browser.yml stands it
#                          up). Removes the `pr-<N>` traffic tag and deletes the
#                          `:pr-<N>` GCR image.
#
#  2. convex-preview-cleanup — deletes the Convex preview deployment that Vercel's
#                          build created via CONVEX_PREVIEW_DEPLOY_KEY. Without
#                          this, previews accumulate to the team quota (40 hard cap)
#                          and block future PR builds with DeploymentQuotaReached.
#                          Convex's CLI has no `delete` subcommand; we call the
#                          Management REST API instead (confirmed in openapi.json:
#                          POST /deployments/{name}/delete, Bearer Team Token auth).
#                          Best-effort — a failure here never blocks a PR close.
#
#                          Requires repo secret CONVEX_ACCESS_TOKEN (Convex Team
#                          Access Token, created in dashboard.convex.dev → Team
#                          Settings → Access Tokens). The existing
#                          CONVEX_PREVIEW_DEPLOY_KEY is deployment-scoped and NOT
#                          accepted by the Management API delete endpoint.

jobs:
  cleanup:
    if: |
      github.base_ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_DEV }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_DEPLOYER_DEV }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Remove pr-<N> tag from dev Cloud Run service
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          TAG="pr-$PR"
          echo "Removing tag $TAG from neonbinder-browser (neonbinder-dev)"
          # `--remove-tags` is idempotent — if the tag is absent (e.g. the
          # deploy-preview job never succeeded for this PR) gcloud still exits 0.
          # That's desired: cleanup should never fail a PR close.
          gcloud run services update-traffic neonbinder-browser \
            --region=us-central1 \
            --project=neonbinder-dev \
            --remove-tags="$TAG"

      - name: Delete the pr-<N> image from dev GCR (best-effort)
        if: always()
        env:
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          IMAGE="gcr.io/neonbinder-dev/neonbinder-browser:pr-$PR"
          echo "Deleting $IMAGE (best-effort; never fails the cleanup)"
          # Best-effort: missing image or insufficient delete perms must not fail
          # a PR close. The tag removal above is the load-bearing teardown.
          gcloud container images delete "$IMAGE" --force-delete-tags --quiet || \
            echo "image $IMAGE not deleted (absent or no delete permission) — ignoring"

  convex-preview-cleanup:
    # Delete the Convex preview deployment for this PR so it doesn't accumulate
    # toward the 40-deployment team quota (DeploymentQuotaReached blocks builds).
    #
    # Strategy: resolve the Vercel preview URL from the GitHub Deployments API
    # (same technique as pr-pipeline.yml's "Resolve Convex preview deployment
    # name" step — Vercel keeps preview URLs live after PR close, so the lookup
    # still works). Extract the Convex deployment name from the x-convex-url
    # meta tag, then DELETE via the Management API.
    #
    # Every leg is best-effort: no Vercel deployment, no x-convex-url, or a 404
    # from Convex (already GC'd) are all silent no-ops. Only truly unexpected
    # errors (network failure, bad token) are logged; they still never fail the
    # PR close (continue-on-error: true on the step).
    if: |
      github.base_ref == 'main'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: read  # needed to query GitHub Deployments API for Vercel preview URL

    steps:
      - name: Delete Convex preview deployment (best-effort)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.pull_request.head.sha }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          CONVEX_ACCESS_TOKEN: ${{ secrets.CONVEX_ACCESS_TOKEN }}
        run: |
          set -uo pipefail

          # Guard: skip cleanly if the management token isn't provisioned yet.
          # This lets the workflow land before the secret is added without
          # hard-failing every PR close.
          if [ -z "${CONVEX_ACCESS_TOKEN:-}" ]; then
            echo "CONVEX_ACCESS_TOKEN not set — skipping Convex preview cleanup"
            echo "(add the secret to enable automatic Convex preview GC)"
            exit 0
          fi

          # Step 1: find the Vercel preview deployment record for this PR's SHA.
          # Vercel keeps preview deployments live after PR close, so the GitHub
          # Deployments API record (creator=vercel[bot]) is still queryable.
          deployment_id=$(gh api \
            "repos/$GITHUB_REPOSITORY/deployments?sha=$SHA&per_page=100" \
            --jq '[.[] | select(.creator.login == "vercel[bot]")] | sort_by(.created_at) | reverse | .[0].id // empty' \
            || true)
          if [ -z "$deployment_id" ]; then
            echo "No Vercel deployment record for SHA=$SHA — no Convex preview to clean up"
            exit 0
          fi

          url=$(gh api \
            "repos/$GITHUB_REPOSITORY/deployments/$deployment_id/statuses" \
            --jq '[.[] | select(.state == "success")] | .[0] | (.environment_url // .target_url // empty)' \
            || true)
          if [ -z "$url" ]; then
            echo "No successful Vercel deployment status found — no Convex preview to clean up"
            exit 0
          fi
          echo "Vercel preview URL: $url"

          # Host allowlist: only send the Vercel bypass secret to a *.vercel.app
          # host, so the secret can't be exfiltrated if the deployment record's
          # URL were ever spoofed/misresolved to an arbitrary host.
          host=$(printf '%s' "$url" | sed -E 's#^https?://([^/]+).*#\1#')
          case "$host" in
            *.vercel.app) : ;;
            *) echo "Vercel preview host '$host' is not *.vercel.app — skipping cleanup"; exit 0 ;;
          esac

          # Step 2: extract the Convex deployment name from the preview's HTML.
          # Vite injects VITE_CONVEX_URL as a <meta name="x-convex-url"> tag at
          # build time; the subdomain is the deployment name accepted by the API.
          html=$(curl -sS --max-time 15 \
            -H "x-vercel-protection-bypass: $VERCEL_AUTOMATION_BYPASS_SECRET" \
            "$url/" || true)
          cloud=$(printf '%s' "$html" \
            | grep -oE 'name="x-convex-url" content="[^"]*"' \
            | grep -oE 'https://[a-z0-9-]+\.convex\.cloud' \
            | head -1 || true)
          if [ -z "$cloud" ]; then
            echo "Could not extract x-convex-url from Vercel preview — no Convex preview to clean up"
            exit 0
          fi
          name="${cloud#https://}"
          name="${name%.convex.cloud}"
          echo "Convex preview deployment candidate: $name"

          # SAFETY GUARD (defense in depth). $name is derived from the PR's own
          # x-convex-url meta tag, which a write-access author (or a build
          # misconfig that falls back to prod) could point at the production or
          # dev deployment. The delete token is team-scoped, so an unguarded
          # delete could wipe prod. Refuse the known shared deployments by name,
          # then fail-closed unless the Management API confirms this is a preview.
          case "$name" in
            first-starfish-800|focused-fox-53)
              echo "::error::refusing to delete non-preview deployment '$name'"; exit 0 ;;
          esac
          dtype=$(curl -s --max-time 15 \
            -H "Authorization: Bearer $CONVEX_ACCESS_TOKEN" \
            "https://api.convex.dev/v1/deployments/$name" \
            | python3 -c "import sys,json;print(json.load(sys.stdin).get('deploymentType',''))" \
            2>/dev/null || true)
          if [ "$dtype" != "preview" ]; then
            echo "::error::refusing to delete '$name' — deploymentType='$dtype' is not a confirmed 'preview' (fail-closed)"
            exit 0
          fi
          echo "Confirmed '$name' is a preview deployment — proceeding to delete"

          # Step 3: delete via the Management API.
          # POST /deployments/{name}/delete — confirmed in api.convex.dev/v1/openapi.json.
          # Auth: Bearer <Team Access Token> (PAT also accepted; deployment-scoped
          # CONVEX_PREVIEW_DEPLOY_KEY is NOT — the Management API requires a
          # broader token scope).
          # 200 = deleted; 404 = already gone (GC'd or never created); both are fine.
          status=$(curl -s \
            -o /tmp/convex-delete-resp.txt \
            -w '%{http_code}' \
            --max-time 15 \
            -X POST "https://api.convex.dev/v1/deployments/$name/delete" \
            -H "Authorization: Bearer $CONVEX_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{}' \
            || echo "000")
          body=$(cat /tmp/convex-delete-resp.txt 2>/dev/null || true)
          echo "Convex Management API response: HTTP $status — $body"

          case "$status" in
            200)
              echo "Convex preview deployment '$name' deleted successfully" ;;
            404)
              echo "Convex preview deployment '$name' not found (already GC'd or never created) — OK" ;;
            000)
              echo "Warning: curl failed (network error?) — logged, not failing PR close" ;;
            *)
              echo "Warning: unexpected HTTP $status from Convex delete API — logged, not failing PR close" ;;
          esac

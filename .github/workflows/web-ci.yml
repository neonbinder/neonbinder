name: Web CI

# Fast inner-loop gate for apps/web: vitest unit/component suite + ESLint on
# every web-touching PR, parallel to the slow Maestro E2E matrix (e2e.yml).
# Lifted from neonbinder_web ci.yml (NEO-48) for the monorepo: scoped to
# apps/web paths + working-directory.

on:
  pull_request:
    paths:
      - "apps/web/**"
  workflow_dispatch:

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUSKY: 0 # skip husky git-hook install in CI

defaults:
  run:
    working-directory: apps/web

jobs:
  unit:
    name: Unit & component tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/web/.nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: apps/web/.nvmrc
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint

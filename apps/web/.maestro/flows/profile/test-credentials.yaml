url: ${APP_URL || "https://localhost:3000"}/testing/sign-in?redirect=/profile&worker=${WORKER_INDEX || "0"}
name: Test BSC and SportLots Credentials
tags:
  - credentials
  - profile
---
# Verifies that both the BSC and SportLots "Test Credentials" buttons succeed
# when real credentials are present. The worker-bootstrap Phase-0 flow seeds
# real credentials server-side via /testing/seed-credentials — this flow
# reuses them without re-seeding so the Puppeteer token cache is intact.
#
# No clear, no restore. This flow's sole purpose is asserting that the
# "Test Credentials" UI action works for both platforms.
#
# Re-seeding is intentionally avoided: seedMyTestCredentials overwrites the
# cached marketplace token, making the next Test call a guaranteed cold login.
# The bootstrap already warmed the tokens via util-login-to-{bsc,sportlots}.

- launchApp

# Wait for /profile to finish loading. "Profile Settings" is the <h1> page
# heading — it appears only after Clerk auth and Convex data are both ready.
# The old "Neon Binder" 45s wait added no product value (pure-UI text with
# no relationship to cred-section readiness); removed per Rule 5.
- extendedWaitUntil:
    visible: "Profile Settings"
    timeout: 30000

# -----------------------------------------------------------------------
# BSC (default tab — no tab switch needed)
# -----------------------------------------------------------------------

# Scroll to the BuySportsCards credential section heading. BSC is always the
# default-selected tab, so the section is already visible without a tab tap.
# centerElement keeps the heading away from the y>=489 footer-steal zone.
- scrollUntilVisible:
    element:
      text: "BuySportsCards Credentials"
    centerElement: true
    timeout: 30000
    waitToSettleTimeoutMs: 1000

# Scroll the "Test Credentials" button into view and center it before tapping.
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Test Credentials"

# 30s sanctioned exception: a cold Puppeteer/SSO BSC login takes ~22s.
# scrollUntilVisible waits AND scrolls the banner into view — no redundant
# assertVisible needed (Rule 6: scroll already asserts element is visible).
- scrollUntilVisible:
    element:
      text: ".*BSC account authenticated successfully.*"
    timeout: 30000
    waitToSettleTimeoutMs: 1000

# -----------------------------------------------------------------------
# SportLots tab
# -----------------------------------------------------------------------

# The credential TABS (BuySportsCards | Sportlots) sit at the TOP of the
# credentials card, ABOVE the BSC "Test Credentials" success banner. The prior
# scroll to that banner (and the Security Information / Prize Pool sections that
# render below it) leaves the page scrolled DOWN past the tablist, so a default
# DOWN scroll walks to the page bottom and never finds "Sportlots" (run
# 28627770654 r0 + 28619632148 r5 — concurrency-INDEPENDENT, layout-driven, not a
# tap drop). Scroll UP to the tab, centered for the tap.
- scrollUntilVisible:
    element:
      text: "Sportlots"
    direction: UP
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Sportlots"

# Wait for the SportLots credential section heading to appear after the tab
# switch. No centerElement here — this is an assert-only scroll (Rule 8).
- scrollUntilVisible:
    element:
      text: ".*Sportlots Credentials.*"
    waitToSettleTimeoutMs: 1000

# Scroll the "Test Credentials" button into view and center it before tapping.
- scrollUntilVisible:
    element:
      text: "Test Credentials"
    centerElement: true
    waitToSettleTimeoutMs: 1000

- tapOn: "Test Credentials"

# 30s sanctioned exception: cold Puppeteer/SSO SportLots login takes ~22s.
# scrollUntilVisible waits AND scrolls the banner into view (Rule 6).
- scrollUntilVisible:
    element:
      text: ".*Sportlots account authenticated successfully.*"
    timeout: 30000
    waitToSettleTimeoutMs: 1000

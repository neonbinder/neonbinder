appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Card detail — the unified Autographed control is always-visible (promoted out of Show features), not gated behind the features editor"
tags:
  - set-selector
  - regression
---
# R1 — SINGLE FEATURE: the Autographed control now lives as an ALWAYS-VISIBLE
# cell in the main CardDetailPanel body (position 7, next to Print run), promoted
# OUT of the collapsed "Show features editor" section. Previously it was hidden
# inside CardFeaturesEditor and only appeared after expanding it; the whole point
# of the NEO-71-74 redesign is that an operator sees and can set Autographed
# without ever opening the features editor.
#
# R2 — ONE HARD ASSERTION, no silent fall-through:
#   ALWAYS-VISIBLE, NOT GATED BY EXPAND. After opening the drawer we assert
#   "Show features editor" is still the COLLAPSED trigger (we never tap it), yet
#   the Autographed pill group is reachable in the main body. Had the control
#   still lived inside the collapsed CardFeaturesEditor, the pill would be ABSENT
#   until "Show features editor" is tapped (which would then flip to "Hide
#   features editor") — so finding the pill while the editor is still collapsed
#   proves it was promoted out. If the promotion regressed, the pill assert fails
#   loudly.
#
# WHY THE OLD "IMMEDIATE SAVE ON CHANGE" ASSERTION WAS DROPPED (NEO-71-74 redesign):
#   This flow was originally written when Autographed was a native <select>
#   (options None / On Card / Sticker) whose SELECTED-option TEXT was readable via
#   getNodeText — so it could change the value, close with Cancel, reopen, and
#   read the value back to prove the per-row setCardFeature write persisted
#   independently of the drawer's Save/dirty cycle. Autographed is now a
#   ToggleOptionsValueControl (two exclusive pills — "Auto (On Card)" /
#   "Auto (Sticker)"; "None" = options[0] has NO pill and no visible text node).
#   Maestro-web cannot read a pill's pressed state (aria-pressed is invisible to
#   the CDP bridge) and "None" has no text node, so a changed value CANNOT be
#   read back — there is nothing to assert across the Cancel/reopen. The one
#   observable proxy for an Autographed write, the None→set Signed By auto-fill,
#   requires the card to carry real playerIds; this flow's per-worker CUSTOM card
#   (added via util-add-custom-card → pendingPlayerNames) never acquires playerIds
#   (only real marketplace-synced cards do — see signed-by-autofills-from-players.yaml),
#   so that proxy cannot fire here either. Rather than fake a pass or attach a
#   real player just to re-derive the auto-fill (which signed-by-autofills-from-players.yaml
#   already owns — that would be cross-flow duplication, R3), we keep the still-
#   fully-provable R1 fact (always-visible-without-expanding) and drop the now-
#   unobservable persistence assertion. Same honest call already validated on
#   new-chain-autopopulates-features.yaml this session.
#
# R3 — DEDUP: signed-by-autofills-from-players.yaml also touches Autographed, but
#   (a) on a REAL Topps Chrome card with playerIds, (b) to prove the Signed-By
#   auto-fill side effect, and (c) AFTER expanding the features editor. It never
#   proves the pill is reachable WHILE the features editor is collapsed on a
#   custom card. This flow owns exactly that one fact. Drill/add via util-add-custom-card.
#
# PER-WORKER DATA ISOLATION: E2E Test Sport ${WORKER_INDEX} -> 2026 -> Topps ->
#   cag-<WORKER_INDEX> (custom set, Insert VT, "Base" insert). Fully isolated.
#   No Autographed write happens, so there is no interrupted-run wedge to worry about.

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO PER-WORKER CUSTOM SET + ADD A CUSTOM CARD
# ============================================================

- runFlow:
    file: util-add-custom-card.yaml
    env:
      SET_NAME: "cag-${WORKER_INDEX || 0}"
      VARIANT_TYPE: "Insert"
      INSERT_NAME: "Base"
      CARD_NUMBER: "778-${ATTEMPT_ID}"
      PLAYER_NAME: "Autograph Test Player ${ATTEMPT_ID}"

# Open the drawer via the Edit button (the reliable opener).
- assertVisible:
    id: "Edit card 778-${ATTEMPT_ID}"
- tapOn:
    id: "Edit card 778-${ATTEMPT_ID}"
    waitToSettleTimeoutMs: 2000
- assertVisible:
    id: "Card name"

# ============================================================
# ASSERTION — ALWAYS-VISIBLE, NOT BEHIND "Show features"
# The features editor is COLLAPSED (its trigger reads "Show features editor").
# We deliberately do NOT tap it. The Autographed pill must still be reachable.
# ============================================================

- assertVisible:
    id: "Show features editor"

# The Autographed row sits in the main body just below the Attributes chips
# (grid with Print run). With the features editor collapsed it lands just past
# the fold, so lift it into view with ONE manual in-drawer swipe. The drawer is
# right-anchored (~480px, x>=544), so we swipe at x=80% — a viewport-centre
# (x~512) swipe would land on the backdrop and never scroll the drawer's inner
# container.
- swipe:
    start: "80%, 70%"
    end: "80%, 35%"

# The pill aria-label contains literal parens ("… Auto (On Card)"); Maestro
# compiles `id:` as a REGEX, so the parens are ESCAPED (\( \)) — an un-escaped
# "(On Card)" is parsed as a capture group and never matches the real resource-id.
# The leading/trailing .* keeps the match robust to Maestro's full-vs-substring id
# semantics. Finding this pill while "Show features editor" is still the collapsed
# trigger PROVES the control was promoted out of the features editor.
- assertVisible:
    id: ".*Value for Autographed: Auto \\(On Card\\).*"

# ============================================================
# CLOSE + CLEANUP — delete this attempt's test card
# ============================================================

- assertVisible:
    id: "Cancel card edit"
- tapOn:
    id: "Cancel card edit"
- assertNotVisible:
    id: "Card name"

- scrollUntilVisible:
    element:
      id: "Delete card 778-${ATTEMPT_ID}"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000
- tapOn:
    id: "Delete card 778-${ATTEMPT_ID}"
- assertVisible: "Confirm?"
- tapOn:
    id: "Confirm delete card 778-${ATTEMPT_ID}"
- assertNotVisible: "Autograph Test Player ${ATTEMPT_ID}"

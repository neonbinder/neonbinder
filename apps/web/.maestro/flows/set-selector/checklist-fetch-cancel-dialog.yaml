appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Checklist — cancel the entity-review wizard; no cards are saved"
tags:
  - set-selector
---
# R1 — ONE FEATURE: cancelling the NEO-92 EntityReviewWizard (the step-through
# replacement for the old all-at-once UnknownEntitiesDialog) aborts the commit —
# no cards are written and no entities are created. Cancel is available on EVERY
# step of the wizard (not only an initial screen), and it calls a real mutation
# (entityReviewQueue.cancelBatch) whose user-visible effect is identical to
# before: "no cards saved".
#
# WHAT THIS TESTS:
#   - The wizard opens after a fetch that surfaces unknown players.
#   - Tapping "Cancel (Esc)" closes the wizard without saving.
#   - The status message reads "Fetch cancelled — no cards saved."
#   - The custom card the preamble added is still present (cancel only discards
#     the fetch preview, never previously-saved rows).
#   - The Fetch/Refresh button is still available for a retry.
#
# NOTE ON ESCAPE KEY (unchanged from the old flow): Maestro's web driver cannot
#   drive a document-level keydown, so the physical Escape key path is not tested
#   here. "Cancel (Esc)" calls the same onCancel path as the key — tapping the
#   button is sufficient to prove the cancel logic.
#
# WIZARD GUARANTEE + PER-ATTEMPT ISOLATION:
#   The preamble adds a custom card to the real 2024 Topps Chrome Base checklist
#   carrying TWO per-attempt-unique player names (CDPlayerA/CDPlayerB-${ATTEMPT_ID}).
#   Those names are always unknown to the global `players` table on this attempt,
#   so fetchCardChecklist always surfaces them and the wizard always opens with
#   at least two undecided items — enough to review one and still cancel with one
#   outstanding. An empty players/teams DB is NOT required. Same real-Base
#   sole-preview pattern as the sibling checklist flows (the wizard can only be
#   exercised on a real marketplace set — a custom subtree short-circuits the
#   fetch to empty, so there is no per-worker-custom alternative here).

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO A BASE VARIANT WITH EMPTY CHECKLIST
# ============================================================

- runFlow:
    file: util-drill-to-base-variant.yaml

# ============================================================
# ADD A CUSTOM CARD WITH TWO UNIQUE PLAYER NAMES
# Guarantees the wizard opens with at least two undecided unknown players, so a
# genuine "review one, cancel with another still outstanding" mid-review cancel
# can be exercised regardless of what other tests have committed to the global
# `players` table. The custom card's players go through fetchCardChecklist's
# reconciliation via the cardChecklist.pendingPlayerNames field.
# ============================================================

- scrollUntilVisible:
    element:
      text: "Add Card"
    centerElement: true
- tapOn: "Add Card"
# "Player name" is the card-name input's placeholder (still rendered visually)
# and becomes visible after the autoFocused "#" input renders.
- extendedWaitUntil:
    visible: "Player name"
# Card number includes ATTEMPT_ID so a retry doesn't add a duplicate row.
- inputText: "9001-${ATTEMPT_ID}"
# Address inputs by aria-label (Maestro's `id:` = accessibility-tree identifier).
# Placeholders overlap ("Player name", "Player(s) — comma separated, optional")
# and the text matcher cannot disambiguate them — see NEO-13 root cause.
- tapOn:
    id: "Card name"
- inputText: "Cancel Dialog Test ${ATTEMPT_ID}"
- scrollUntilVisible:
    element:
      text: "Player(s) — comma separated, optional"
    centerElement: true
- tapOn:
    id: "Players"
- inputText: "CDPlayerA-${ATTEMPT_ID}, CDPlayerB-${ATTEMPT_ID}"
# Defensive: confirm at least one typed player name landed before submitting.
- assertVisible:
    text: ".*CDPlayerA-${ATTEMPT_ID}.*"
- scrollUntilVisible:
    element:
      text: "Add"
    centerElement: true
- tapOn:
    text: "Add"
# The new card row renders in the virtualized checklist wherever its number
# sorts — scroll to anchor on its title rather than assuming the viewport.
- scrollUntilVisible:
    element:
      text: "Cancel Dialog Test ${ATTEMPT_ID}"
    timeout: 15000

# ============================================================
# TRIGGER THE FETCH AND WAIT FOR THE WIZARD
# ============================================================

# After the add-custom-card preamble scrolled DOWN, the Sync button can land at
# y~17-49 when centerElement is applied to it directly — inside the 64px sticky
# binder-header (z-20), whose overlay absorbs the tap. Fix: scroll UP to
# "Add Card" (same flex row as "Sync card checklist") so centering it at ~y=315
# puts the Sync button in the tap band.
- scrollUntilVisible:
    element:
      text: "Add Card"
    direction: UP
    centerElement: true
    visibilityPercentage: 50
- extendedWaitUntil:
    visible:
      id: "Sync card checklist"
- tapOn:
    id: "Sync card checklist"
# The wizard shows the same title text as the old dialog ("Confirm New Players &
# Teams"), so this title assertion still identifies it. 60s covers the backend
# marketplace fetch (BSC ~30s ceiling + SL in parallel). The unique
# CDPlayerA/B-${ATTEMPT_ID} guarantee the wizard opens — no escape hatch to
# "Saved N cards".
- extendedWaitUntil:
    visible:
      text: "Confirm New Players & Teams"
    timeout: 60000

# ============================================================
# CANCEL — the footer Cancel is present on EVERY step of the wizard
# "Cancel (Esc)" is available on every step (review, "looking up…", and the
# final "all reviewed") and its cancelBatch semantics are identical regardless
# of how many items were reviewed — so cancel WITHOUT reviewing an item first.
# (Reviewing would depend on a live Wikidata lookup completing, and the batch is
# persistent per set — a prior run may have left it fully decided; cancelling
# from any state is the robust, equivalent proof of "no cards saved".) The
# wizard is confirmed open above, so this is unconditional.
# ============================================================

# NEO-85 residual coordinate-staleness (same class as
# custom-field-known-value-selects.yaml): the entityReviewQueue batch is keyed
# only by selectorOptionId (no per-worker scoping), so a DIFFERENT concurrent CI
# runner exercising the wizard against this SAME real "2024 Topps Chrome Base"
# set can commit the shared batch mid-tap. When it does, getBatch reactively
# re-renders this wizard to the empty "0 of 0 reviewed" state, collapsing the
# two-button footer (Cancel + Confirm & Save) to a single Cancel-only button that
# shifts position — so Maestro's captured tap coordinates go stale and the click
# misses. Result-keyed retry: re-fire the Cancel tap ONCE iff the wizard title is
# still visible after the first attempt. A genuine failure (e.g. cancelBatch
# actually erroring) still fails loudly once the retry is exhausted.
- retry:
    maxRetries: 1
    commands:
      - tapOn:
          text: "Cancel (Esc)"
          retryTapIfNoChange: true
      - extendedWaitUntil:
          notVisible: "Confirm New Players & Teams"
          timeout: 5000

# ============================================================
# VERIFY NOTHING WAS SAVED
# ============================================================

# Cancel message — set by CardChecklist's onCancel (cancelBatch + this text).
- assertVisible: "Fetch cancelled — no cards saved."

# Our custom card is still there (cancel only discards the BSC/SL preview).
- scrollUntilVisible:
    element:
      text: "Cancel Dialog Test ${ATTEMPT_ID}"
    centerElement: true
    timeout: 15000

# Fetch/Refresh button still available for a retry — it lives at the TOP of the
# CardChecklist, off-screen after scrolling to the custom card. Scroll UP to it.
- scrollUntilVisible:
    element:
      id: "Sync card checklist"
    direction: UP
    centerElement: true

appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Checklist — keyboard-only confirm of the review wizard's final Save step via Enter"
tags:
  - set-selector
---
# R1 — ONE FEATURE: a keyboard user can complete the NEO-92 EntityReviewWizard
# and commit with the Enter key. After every unknown name is decided, the wizard
# shows a final "All reviewed — save N cards?" step whose "Confirm & Save (Enter)"
# button is AUTO-FOCUSED (confirmButtonRef.focus() on the allDecided transition),
# and the wizard's keydown handler fires onConfirm on Enter when allDecided. This
# proves the keyboard path end-to-end without touching the mouse for the commit.
#
# WHAT THIS TESTS:
#   1. The wizard opens after a fetch that surfaces one unknown player.
#   2. The single unknown is reviewed ("Add as New Player") — reaching the final
#      "All reviewed" step (this tap is the one click; the commit is keyboard).
#   3. The final "Confirm & Save (Enter)" button is auto-focused, so pressing
#      Enter immediately fires onConfirm and commits — no prior navigation.
#   4. Cards are saved after the keyboard-only confirmation.
#
# MAESTRO KEYBOARD CONSTRAINTS (carried forward, re-verified for the wizard):
#   - `pressKey: Tab` is NOT supported on Maestro web. Not needed: the wizard
#     shows one item at a time, so there is no multi-control Tab traversal to
#     drive (the old checkbox-list keyboard model is gone).
#   - `pressKey: Escape` does NOT reach the wizard's div-level keydown handler
#     (Maestro can't originate a document/element keydown that bubbles there
#     unless the element is focused), so the Escape-cancels path is exercised
#     manually, not here. The link-search sub-panel's own Escape (on its focused
#     input) and the throughout-available Cancel button are covered by
#     checklist-fetch-cancel-dialog.yaml and the link-existing flow.
#   - `pressKey: Enter` IS supported and fires the focused element's handler.
#     On the final step the confirm button is auto-focused, so Enter goes
#     straight to onConfirm — the mechanism the old dialog relied on, unchanged.
#
# PER-ATTEMPT ISOLATION: KOPlayer-${ATTEMPT_ID} is unique per attempt, so the
#   wizard always opens with exactly this one fresh unknown regardless of prior
#   runs. Real-Base sole-preview pattern (the wizard can only be exercised on a
#   real marketplace set — a custom subtree short-circuits the fetch to empty).

# ============================================================
# LAUNCH + SIGN IN
# ============================================================

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO A BASE VARIANT WITH EMPTY CHECKLIST
# ============================================================

- runFlow:
    file: util-drill-to-base-variant.yaml

# ============================================================
# ADD A CUSTOM CARD WITH A UNIQUE PLAYER NAME
# Guarantees the wizard opens with exactly one fresh unknown, so reviewing it
# reaches the final "All reviewed" step immediately (the cleanest keyboard case).
# ============================================================

- scrollUntilVisible:
    element:
      text: "Add Card"
    centerElement: true
- tapOn: "Add Card"
- extendedWaitUntil:
    visible: "Player name"
- inputText: "9002-${ATTEMPT_ID}"
- tapOn:
    id: "Card name"
- inputText: "Keyboard Dialog Test ${ATTEMPT_ID}"
- scrollUntilVisible:
    element:
      text: "Player(s) — comma separated, optional"
    centerElement: true
- tapOn:
    id: "Players"
- inputText: "KOPlayer-${ATTEMPT_ID}"
# Defensive: confirm the typed player name landed before submitting.
- assertVisible: "KOPlayer-${ATTEMPT_ID}"
# Plain "Add" (full-match) binds to the submit button, not the "Add Card" header.
- scrollUntilVisible:
    element:
      text: "Add"
    centerElement: true
- tapOn:
    text: "Add"
- scrollUntilVisible:
    element:
      text: "Keyboard Dialog Test ${ATTEMPT_ID}"

# Defensive: under parallel load addCustomCard has been observed to commit
# server-side while the client's setShowAddForm(false) doesn't fire, leaving the
# Add Card form open and the header buttons hidden. Tapping the form's Cancel
# restores them. If the form already closed (happy path) this is a no-op.
- runFlow:
    when:
      visible: "Cancel"
    commands:
      - scrollUntilVisible:
          element:
            text: "Cancel"
          centerElement: true
      - tapOn:
          text: "Cancel"
          optional: true
      - extendedWaitUntil:
          notVisible: "Cancel"

# ============================================================
# TRIGGER THE FETCH
# ============================================================

# Scroll UP to "Add Card" (same flex row as "Sync card checklist") and center it
# so the Sync button lands in the tap band clear of the sticky binder-header.
- scrollUntilVisible:
    element:
      text: "Add Card"
    direction: UP
    centerElement: true
    visibilityPercentage: 50
- extendedWaitUntil:
    visible:
      id: "Sync card checklist"
- tapOn:
    id: "Sync card checklist"
# The wizard shows the same title as the old dialog. 60s covers the marketplace
# fetch. KOPlayer-${ATTEMPT_ID} guarantees the wizard opens.
- extendedWaitUntil:
    visible:
      text: "Confirm New Players & Teams"
    timeout: 60000

# ============================================================
# REACH THE FINAL "All reviewed" STEP (the COMMIT is what's keyboard-driven)
# The keyboard assertion is the final Enter-confirm below; getting there just
# requires every unknown decided. Decide them all at once via the bulk
# "Add All Remaining as New (N)" button, which is visible whenever any item is
# undecided and marks every remaining row (including still-pending ones) as
# "create" in a single call — so no per-item Wikidata wait, and robust to
# however many unknowns the fetch surfaced. If the (persistent) batch was
# already fully decided by a prior run, the button is absent and the final step
# is already showing — the guard skips and we proceed straight to Enter.
# ============================================================

- runFlow:
    when:
      visible:
        text: ".*Add All Remaining as New.*"
    commands:
      - tapOn:
          text: ".*Add All Remaining as New.*"

# ============================================================
# KEYBOARD CONFIRMATION — Enter on the auto-focused final Save button
# Once every unknown is decided the wizard shows the final step and auto-focuses
# "Confirm & Save (Enter)" (confirmButtonRef.focus() on the allDecided
# transition). Wait for that button (30s covers the bulk decision patching many
# rows), then press Enter — the wizard's keydown handler fires onConfirm, the
# keyboard-only commit.
# ============================================================

- extendedWaitUntil:
    visible:
      text: ".*Confirm & Save.*"
    timeout: 30000
- pressKey: Enter

# ============================================================
# VERIFY CARDS SAVED
# ============================================================

- extendedWaitUntil:
    notVisible: "Confirm New Players & Teams"
# commitCardChecklist writes the full real-Base checklist on a cold commit — a
# bulk WRITE, sanctioned longer wait (analogous to the marketplace-fetch carve-out).
- extendedWaitUntil:
    visible:
      text: ".*Saved [0-9]+ cards.*"
    timeout: 30000
- assertVisible:
    text: ".*#[0-9].*"

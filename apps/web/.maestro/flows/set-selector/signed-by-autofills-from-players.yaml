appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Signed By auto-fills from the card's players when Autographed flips None → On Card (real Topps Chrome Base, sole-writer)"
tags:
  - set-selector
  - regression
---
# ============================================================================
# R1 — ONE FEATURE UNDER TEST: the setCardFeature side-effect (NEO-24 typed
#   controls). When an operator flips a CARD's "Autographed" feature from
#   blank/"None" to a real format ("On Card"), the mutation auto-seeds that
#   card's "Signed By" feature with the name(s) of the player(s) already
#   attached to the card (cardChecklist.playerIds[]) — the operator types
#   nothing. This flow drives exactly that transition through the UI and
#   proves Signed By changed as a direct result.
#
# WHY THE REAL Topps Chrome BASE SET (and not a per-worker custom set):
#   The auto-fill reads card.playerIds[]. Only REAL marketplace-synced cards
#   ever carry playerIds: commitCardChecklist resolves playerIds ONLY for the
#   marketplace cards in its fetch preview (convex/selectorOptions.ts —
#   the `out` array is built purely from BSC/SL rows). A CUSTOM card added via
#   addCustomCard stores its player names in `pendingPlayerNames`, and the
#   commit only CLEARS those pending names once the player entity exists — it
#   never writes playerIds back onto a custom row (custom rows are excluded
#   from the preview, so the playerIds-patch branch never runs for them).
#   Net: a custom card CANNOT acquire playerIds, so the auto-fill can only be
#   exercised on a real synced card. setup.yaml pre-syncs the 2024 Topps Chrome
#   Base checklist AND confirms its UnknownEntitiesDialog, so every Base card
#   has real playerIds — the required precondition.
#
# ISOLATION STORY (sole-writer tolerance — same model as
# topps-chrome-add-feature.yaml):
#   This flow is the SOLE writer of the chosen Base card's `autographed` and
#   `signedBy` FEATURES. No other flow writes a real Base card's autographed/
#   signedBy: features-propagation writes a per-worker CUSTOM set's Signed By;
#   the card-checklist flows (skip-some / cancel-dialog / keyboard-only / setup)
#   run commitCardChecklist which patches real cards' playerIds / attributes /
#   sortOrder but NEVER their `features` map (grep the existing-card patch in
#   commitCardChecklist — no `features` key), so a concurrent Base re-sync can
#   never clobber the autographed/signedBy this flow sets. Only ONE instance of
#   this flow is enqueued per run, so it never races itself. Safe under the
#   NEO-49 work-queue via sole-writer tolerance (no serial lane exists anymore).
#
# INTERRUPTED-RUN / RE-RUN SAFETY:
#   Step 6 defensively NORMALISES autographed to "None" before the action,
#   regardless of what a prior (possibly interrupted) run left it as
#   (unset / None / a leftover "On Card"). Step 7 then overwrites signedBy with
#   a per-attempt UNIQUE sentinel. So the None→On-Card transition in Step 8
#   always fires fresh and the sentinel is always distinct from any player name.
#   The restore in Step 10 puts autographed back to "None". signedBy is left
#   holding the player name(s) (the auto-fill target — a semantically-correct
#   value; there is no UI affordance to clear a feature back to empty, an empty
#   commit is a no-op in useReactiveField), and the next run's Step 7 re-seeds
#   its own sentinel over it — self-healing. Under sole-writer tolerance this
#   leftover is inert (no other flow reads a Base card's signedBy).
#
# THE ASSERTION (R2 — both a positive player-name match AND a sentinel-overwrite):
#   Because the target is the FIXED card #300 of the immutable 2024 Topps Chrome
#   Base set — "Julio Rodriguez", a single-player card — the auto-filled value is
#   KNOWN ahead of time: signedBy becomes "Julio …". So we assert BOTH:
#     (a) POSITIVE — signedBy matches ".*Julio.*" after the toggle (the player
#         NAME landed, not merely "something changed"); AND
#     (b) OVERWRITE — signedBy is no longer the per-attempt sentinel we seeded
#         first. The ONLY code path that overwrites signedBy on an autographed
#         None→set transition is this auto-fill (this flow is the card's sole
#         writer), so the change from sentinel→"Julio" is unambiguous proof.
#   This also self-serves the "card has players" precondition: if card #300 had
#   no playerIds, names.length===0 → the mutation's `if (names.length > 0)` guard
#   skips the write → signedBy stays the sentinel → both (a) and (b) fail loudly.
#   (The read-only "Players" chips are unlabelled <span>s and sit far down the
#   drawer's inner scroll — which Maestro's centre-swipe can't drive, see Step 4
#   — so they are neither a viable capture source nor a scrollable assertion; the
#   known-card positive match above is the robust substitute.)
#
# FLOW:
#   0. Drill to real 2024 Topps Chrome Base.
#   0b. Ensure the Base checklist is populated WITH playerIds — skipped when the
#       setup track already pre-synced it (CI); self-fetches + player-confirms
#       when empty (local single-flow run), so the flow needs no setup track.
#   1-2. Open a real Base card's detail drawer (card #300 — Julio Rodriguez, a
#        stable single-player card).
#   3. Expand the card features editor.
#   4. Manual in-drawer swipe to lift the Autographed / Signed By rows into the
#      tap band (Maestro's centre-swipe can't drive the drawer's inner scroll).
#   5. PRECONDITION: normalise Autographed to "None" (defensive) + assert it.
#   6. PRECONDITION: set Signed By to a unique sentinel + assert it.
#   7. ACTION: flip Autographed "None" → "On Card" via the native <select>.
#   8. ASSERT: Autographed now "On Card"; Signed By now shows "Julio …" (the
#      player) AND is no longer the sentinel — the auto-fill fired.
#   9. RESTORE: Autographed back to "None"; close the drawer.
#
# NATIVE <select> INTERACTION (Autographed is inputType "select"):
#   Maestro-web cannot tap a native <option> (the dropdown is not in the DOM).
#   The documented workaround is to FOCUS the <select> via tapOn, then type the
#   target option's unique first letter — the browser's type-ahead navigates to
#   it and fires the <select>'s change event (→ setCardFeature). Our options are
#   "None"/"On Card"/"Sticker/Label": "N"→None, "O"→On Card (unique first
#   letters). If this mechanism regressed, Step 6's "Autographed = None" assert
#   fails FIRST — an early, unambiguous signal rather than a deep-flow failure.
# ============================================================================

# Step 0 — open the app at the signed-in /set-selector route.
- launchApp
# Cold sign-in / app load (Clerk auth + rate-limit backoff on the Nth concurrent
# sign-in). Every UI wait below uses Maestro's 7s default (R5); the only longer
# wait is the live SL round-trip inside util-drill-to-base-variant.
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# STEP 0 (cont.) — DRILL TO REAL 2024 TOPPS CHROME BASE (R9)
# util-drill-to-base-variant confirms the BaseSetPicker (a live SL fetch, ~60s)
# and leaves the pre-synced CardChecklist visible with "Add Card" in view.
# ============================================================

- runFlow:
    file: util-drill-to-base-variant.yaml

# ============================================================
# STEP 0b — ENSURE THE BASE CHECKLIST IS POPULATED (with playerIds)
# In the CI work-queue the setup track pre-syncs + player-confirms the Base
# checklist BEFORE this flow runs, so the checklist is already populated and
# this guarded block is SKIPPED (the empty-state text is absent → the `when`
# resolves false immediately). It only runs when the checklist is empty (e.g. a
# local single-flow run where the setup track did not run): tap "Fetch from
# Marketplaces" (a live BSC/SL round-trip, ~60s) and CONFIRM the
# UnknownEntitiesDialog so every real card is saved WITH resolved playerIds —
# the precondition the auto-fill reads. This keeps the flow self-sufficient
# without depending on (or re-running) the destructive setup track.
- runFlow:
    when:
      visible: "No cards in this checklist yet."
    commands:
      - tapOn:
          text: ".*Fetch from Marketplaces.*"
      # First fetch: all players/teams are new → UnknownEntitiesDialog opens.
      # A populated-enough set may commit immediately ("Saved N cards.").
      - extendedWaitUntil:
          visible:
            text: ".*Confirm New Players.*|.*Saved [0-9]+ cards.*"
          timeout: 60000
      - runFlow:
          when:
            visible: "Confirm New Players & Teams"
          commands:
            - extendedWaitUntil:
                visible:
                  text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
                timeout: 10000
            - tapOn:
                text: ".*Confirm [0-9]+ & Save.*|Skip All & Save"
            - extendedWaitUntil:
                notVisible: "Confirm New Players & Teams"
                timeout: 30000
      - extendedWaitUntil:
          visible:
            text: ".*Saved [0-9]+ cards.*"
          timeout: 30000

# ============================================================
# STEP 1 — OPEN A REAL BASE CARD's DETAIL DRAWER
# Target card #300 (a stable card in the immutable 2024 Topps Chrome Base set —
# "Julio Rodriguez", a single-player card, so it carries playerIds). It sorts
# near the BOTTOM of the ~300-card checklist, which a DOWN scroll reliably
# reaches from ANY virtualised start position (react-virtuoso does not
# deterministically mount at the top after the drill's page-scrolling, so a
# top-anchored card like #1 is NOT reliably reachable — a DOWN scroll walks to
# the bottom). waitToSettleTimeoutMs absorbs the virtualisation/reactive-refetch
# race from any concurrent Base re-sync shifting row y-coords between Maestro's
# lookup and tap dispatch. 30s covers the full-list DOWN walk.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Edit card 300"
    centerElement: true
    visibilityPercentage: 50
    timeout: 30000
- tapOn:
    id: "Edit card 300"
    waitToSettleTimeoutMs: 2000
- assertVisible:
    id: "Card name"

# Confirm we opened the intended card (drawer header shows "Card #300").
- assertVisible:
    text: ".*Card #300.*"

# ============================================================
# STEP 3 — EXPAND THE CARD FEATURES EDITOR
# The editor is collapsed by default (position 3 in the drawer body, near the
# top). centerElement keeps the toggle clear of the y>=489 footer-steal zone (R8).
# ============================================================

- scrollUntilVisible:
    element:
      id: "Show features editor"
    centerElement: true
    visibilityPercentage: 50
    timeout: 10000
- tapOn:
    id: "Show features editor"
- assertVisible:
    id: "Card features editor"

# ============================================================
# STEP 4 — LIFT THE Autographed / Signed By ROWS INTO THE TAP BAND
# The expanded editor fills the drawer down to the Signed By / Rookie rows,
# which sit low (y~510-570) right above the drawer's sticky Cancel/Save footer.
# Maestro's scrollUntilVisible swipes from the VIEWPORT centre (x~512), but the
# 480px right-anchored drawer starts at x~544 — so that swipe lands on the
# backdrop and cannot drive the drawer's inner scroll (this is exactly why the
# far-down "Players" section is unreachable, and why the card-has-a-player
# precondition is asserted differently below — via the Signed By auto-fill
# itself: no players → names.length 0 → signedBy stays the sentinel → Step 7
# fails). A MANUAL swipe INSIDE the drawer's x-range (x~80%) scrolls its content
# up, lifting Autographed + Signed By to the comfortable middle band before we
# tap them. React preserves the container's scrollTop across the per-row
# re-renders our edits trigger, so one swipe here holds for the whole sequence.
# ============================================================

- swipe:
    start: "80%, 60%"
    end: "80%, 38%"

# ============================================================
# STEP 5 — PRECONDITION: NORMALISE Autographed TO "None"
# Focus the <select> and type "N" → type-ahead selects "None". Card #300 renders
# Autographed unset ("— Select —") on a fresh card; a prior run may have left it
# "None" (onChange then no-ops — SelectValueControl guards next===selected) or a
# leftover "On Card". Either way this writes/keeps "None". The assert confirms the
# None precondition AND is the earliest check that the native-<select> type-ahead
# mechanism works at all. Setting "None" is NOT a real autograph (isNowSet=false),
# so it does NOT trigger the auto-fill here — that only fires on None→a real
# format (Step 7).
# ============================================================

- assertVisible:
    id: "Value for Autographed"
- tapOn:
    id: "Value for Autographed"
- inputText: "N"
- extendedWaitUntil:
    visible:
      id: "Value for Autographed"
      text: "None"
    timeout: 7000

# ============================================================
# STEP 6 — PRECONDITION: SET Signed By TO A UNIQUE SENTINEL
# A per-attempt UNIQUE value guarantees it differs from the real player name, so
# Step 8 can prove the toggle OVERWROTE it (and re-seeds it over any leftover from
# a prior run — re-run safety). The card feature inputs carry unique per-field
# marker classes (useFieldTestClass on CardFeatureRow), so inputText lands in
# Signed By, not the first shared-class text input.
# ============================================================

- assertVisible:
    id: "Value for Signed By"
- tapOn:
    id: "Value for Signed By"
- eraseText: 60
- inputText: "SBSENT-${ATTEMPT_ID}"
- pressKey: Enter
# Single-row Convex patch — confirm the sentinel landed within the 7s write SLA.
- extendedWaitUntil:
    visible:
      id: "Value for Signed By"
      text: ".*SBSENT-${ATTEMPT_ID}.*"
    timeout: 7000

# ============================================================
# STEP 7 — THE ACTION: FLIP Autographed "None" → "On Card"
# Focus the <select>, type "O" → type-ahead selects "On Card" → change event →
# setCardFeature(key=autographed, value="On Card"). Because autographed was
# "None" (wasBlank) and the card has playerIds, the mutation auto-seeds
# signedBy = the player name(s), overwriting the sentinel. Tapping the <select>
# also blurs the Signed By input, so useReactiveField's focus-guard mirroring is
# free to write the auto-filled value into the (now idle) input for us to read.
# ============================================================

- tapOn:
    id: "Value for Autographed"
- inputText: "O"

# ============================================================
# STEP 8 — ASSERTIONS
#   (a) POSITIVE: the <select> now reads "On Card" — the transition happened.
#   (b) POSITIVE: Signed By now shows the card's player — card #300 is Julio
#       Rodriguez (a stable single-player card in the immutable 2024 Topps Chrome
#       Base set), so the auto-fill seeds signedBy = "Julio …". Matching ".*Julio.*"
#       is robust to any surname accent/spelling and proves the player NAME landed,
#       not just "something changed".
#   (c) CORE R2: Signed By is NO LONGER the sentinel — the None→On-Card transition
#       overwrote it. The only writer of signedBy on this transition is the
#       auto-fill (player names), and this flow is the card's sole writer, so a
#       change off the sentinel to the player name proves the auto-fill fired.
#   All are single-row Convex writes / DOM mirrors → 7s SLA.
# ============================================================

- extendedWaitUntil:
    visible:
      id: "Value for Autographed"
      text: "On Card"
    timeout: 7000
- extendedWaitUntil:
    visible:
      id: "Value for Signed By"
      text: ".*Julio.*"
    timeout: 7000
- assertNotVisible:
    id: "Value for Signed By"
    text: ".*SBSENT-${ATTEMPT_ID}.*"

# ============================================================
# STEP 9 — RESTORE + CLOSE
# Put autographed back to "None" (sole-writer: leave the shared card's feature
# as we found it). signedBy keeps the auto-filled player name(s) — inert leftover
# (no flow reads a Base card's signedBy; the next run's Step 6 re-seeds its own
# sentinel). Then Cancel closes the drawer immediately: the feature edits persist
# per-row via setCardFeature (they are NOT part of the drawer's dirty draft, which
# only tracks name/title/description/attributes — untouched here), so Cancel does
# not trip the dirty guard.
# ============================================================

- tapOn:
    id: "Value for Autographed"
- inputText: "N"
- extendedWaitUntil:
    visible:
      id: "Value for Autographed"
      text: "None"
    timeout: 7000

- assertVisible:
    id: "Cancel card edit"
- tapOn:
    id: "Cancel card edit"
- assertNotVisible:
    id: "Card name"

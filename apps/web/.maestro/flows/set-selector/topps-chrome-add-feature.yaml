appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Topps Chrome — toggle the Reprint checkbox feature via SetAttributesPanel and verify save toast + re-hydration across reload (sole-writer)"
tags:
  - regression
  - set-selector
---
# Toggles the "Reprint" CHECKBOX feature on the REAL 2024 Topps Chrome set and
# verifies:
#   1. Toggling the checkbox fires the "Saved Reprint" confirmation toast — i.e.
#      the new CheckboxValueControl → onSave → setSelectorOptionFeature single-row
#      patch path works end-to-end on real synced data.
#   2. Re-hydration across reload: after a full page reload + re-drill, the panel
#      re-renders the Reprint checkbox row from the persisted snapshot and it is
#      still interactive — toggling it again fires the toast again.
#
# NEO-71-74 CHECKBOX CONTRACT: isReprint changed from inputType "text" to the new
# "checkbox" input type. It renders as a real <input type="checkbox"> (via
# CheckboxValueControl) storing the strings "true"/"false" in the features map.
# You TOGGLE it with tapOn (each tap flips the stored value → always a real change
# from the stored value → the "Saved Reprint" toast always fires — no two-step
# CLEAR→value dance is needed the way the old text field required).
#
# WHY THIS PROVES RE-HYDRATION AND NOT A LITERAL BOOLEAN VALUE (Maestro-web
# limitation — a genuine tooling finding, not a flow shortcut): a checkbox's
# CHECKED state is NOT observable in Maestro-web. maestro-web.js `traverse` emits
# no `checked` attribute for any node (so a `checked:` selector never matches),
# and a valueless <input type=checkbox> reports `value="on"` for BOTH checked and
# unchecked (so getNodeText / a `text:` match cannot distinguish "true" from
# "false"). Therefore the exact persisted boolean cannot be read back after a
# reload. What CAN be proven — and what this flow asserts — is that the feature
# row survives the reload, re-renders from the persisted snapshot, and remains
# saveable (re-toggle → toast). The write-once copy-down that Reprint used to
# demonstrate is proven (for its unreadable checkbox value) via Manufacturer
# (same 1-hop) in new-chain-autopopulates-features.yaml, and the string-sentinel
# / no-cascade coverage now lives in features-propagation.yaml on "Signed By".
#
# ISOLATION STORY (sole-writer tolerance):
#   This flow is the SOLE writer of Topps Chrome's Reprint feature. No other flow
#   writes that datum: topps-chrome-marketplace-read.yaml is read-only and only
#   checks the row exists; features-propagation.yaml writes a per-worker custom
#   set's Signed By (never touches the real Topps Chrome Reprint value); card
#   checklist flows read Base badges, not Reprint. Because only one instance of
#   this flow is enqueued per run it never races itself. Each tap flips the value,
#   and the flow taps exactly twice (once per session) → net self-restoring, so it
#   leaves Topps Chrome's Reprint exactly as it found it. Safe under the NEO-49
#   work-queue via sole-writer tolerance — no serial lane needed (none exists).
#
# SAVE TOAST TIMING:
#   The "Saved Reprint" toast is optimistic (fires before the Convex write
#   awaits) but the single-row write still lands well within Convex's 7s SLA;
#   a >7s save is a product finding, not a pad to inflate.
#
# PREREQUISITE (implicit): Topps Chrome with variant types and card checklist
# rows must already exist in the shared Convex deployment (seeded by the cascade
# setup track), same as topps-chrome-marketplace-read.yaml.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO 2024 TOPPS CHROME (setName level)
# ============================================================

- runFlow:
    file: util-drill-to-2024-topps-chrome.yaml

# ============================================================
# OPEN THE SET ATTRIBUTES PANEL
# At the setName level the panel defaults EXPANDED.
# Idempotent expand guard in case a prior isolated flow collapsed it.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Edit attributes"
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 7000

# IDEMPOTENT EXPAND: tap only if currently collapsed.
- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - extendedWaitUntil:
          visible:
            id: "Hide attributes"
          timeout: 5000

- assertVisible:
    id: "Hide attributes"

# ============================================================
# TOGGLE THE REPRINT CHECKBOX — "Value for Reprint"
# A single tap flips the stored value ("true"⇄"false"), which is ALWAYS a real
# change from the stored value, so handleSaveFeature does NOT hit its no-op guard
# (features[key] !== new value) and the "Saved Reprint" toast always fires.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Value for Reprint"
    centerElement: true
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 7000

- tapOn:
    id: "Value for Reprint"

- extendedWaitUntil:
    visible:
      text: ".*Saved Reprint.*"
    timeout: 7000

# ============================================================
# VERIFY RE-HYDRATION ACROSS RELOAD — reload the page and re-drill
# Navigate away and back; confirm the Reprint checkbox row re-renders from the
# persisted snapshot and remains interactive (re-toggle → toast).
# util-drill-to-2024-topps-chrome navigates to /set-selector itself.
# ============================================================

- runFlow:
    file: util-drill-to-2024-topps-chrome.yaml

# Open the panel again.
- scrollUntilVisible:
    element:
      id: "Edit attributes"
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 7000

- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - extendedWaitUntil:
          visible:
            id: "Hide attributes"
          timeout: 5000

# Scroll to the re-hydrated Reprint checkbox row. The scroll IS the assertion
# that the feature row survived the reload (R6 — no redundant assertVisible of
# the same element after).
- scrollUntilVisible:
    element:
      id: "Value for Reprint"
    centerElement: true
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 1000
    timeout: 7000

# Re-toggle it — this second flip restores the original value AND proves the
# re-hydrated checkbox is still wired to the save path (toast fires again).
- tapOn:
    id: "Value for Reprint"

- extendedWaitUntil:
    visible:
      text: ".*Saved Reprint.*"
    timeout: 7000

appId: com.neonbinder.web
url: ${APP_URL || "http://localhost:3000"}/testing/sign-in?redirect=/set-selector&worker=${WORKER_INDEX || "0"}
name: "Topps Chrome — read-only verify marketplace-derived set attributes are present (read-only)"
tags:
  - regression
  - set-selector
---
# Read-only verification of the SetAttributesPanel on the REAL 2024 Topps Chrome set.
#
# WHY READ-ONLY / NO ISOLATION NEEDED:
#   This flow performs zero writes — it never taps a save button, "Edit attributes",
#   or any mutating input. Because it only reads, concurrent workers in the NEO-49
#   work-queue cannot stomp each other. No isolated lane is needed (the isolated lane
#   is gone; the queue is dynamic, not phased).
#
# WHAT THIS VERIFIES:
#   1. BSC/SportLots sync (run by the setup track) persisted feature data on the
#      real Topps Chrome set — League rows and the "Will propagate to N cards"
#      counter are visible.
#   2. The panel heading, breadcrumb, and at least one populated metadata field
#      are present — the panel renders correctly with real marketplace data.
#   3. At least one feature input row (aria-label "Value for League") is rendered,
#      confirming the features list is populated from the BSC/SL sync.
#
# PREREQUISITE (implicit): the setup track must have run at least once on this
# Convex deployment so Topps Chrome is in selectorOptions. On a brand-new
# deployment the flow will fail clearly ("Topps Chrome" not visible in Sets).
#
# NO WRITES: this flow never taps a save button, "Edit attributes", or any
# input field that mutates data.

- launchApp
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 45000

# ============================================================
# DRILL TO 2024 TOPPS CHROME (setName level)
# The util navigates to /set-selector itself and returns with
# Baseball → 2024 → Topps → Topps Chrome selected, ready at
# the Variant Types column.
# ============================================================

- runFlow:
    file: util-drill-to-2024-topps-chrome.yaml

# ============================================================
# OPEN SET ATTRIBUTES PANEL (read-only expand)
# Scroll to the "Edit attributes" toggle first to locate the panel area.
# At the setName level the panel defaults EXPANDED, but we guard with the
# idempotent expand pattern in case a prior test collapsed it.
# ============================================================

- scrollUntilVisible:
    element:
      id: "Edit attributes"
    visibilityPercentage: 10
    timeout: 7000

# IDEMPOTENT EXPAND: tap only if the panel is currently collapsed.
- runFlow:
    when:
      visible:
        id: "Edit attributes"
    commands:
      - tapOn:
          id: "Edit attributes"
      - extendedWaitUntil:
          visible:
            id: "Hide attributes"
          timeout: 5000

# Panel is open — "Hide attributes" toggle must be present.
- assertVisible:
    id: "Hide attributes"

# ============================================================
# ASSERT BREADCRUMB SCOPE TEXT
# The breadcrumb shows "Attributes for Topps Chrome (Set) — ... › Topps".
# The "›" separator is the reliable indicator that ancestry is rendered.
# ============================================================

- assertVisible:
    text: ".*›.*Topps Chrome.*"

# ============================================================
# ASSERT MARKETPLACE-DERIVED FEATURE DATA IS PRESENT (below the fold)
# The BSC/SportLots sync populates feature rows (e.g. League) on real sets.
# The expanded panel BODY renders below the panel header, which on cold CI
# sits at the very bottom of the 1024x625 viewport — so all of this content
# starts just below the fold. Each check below is therefore a
# scrollUntilVisible (the scroll IS the assertion: it fails loudly if the
# element never appears — R6, no redundant trailing assertVisible), walking
# the panel TOP->BOTTOM so every scroll moves DOWN monotonically:
#   1) "Will propagate to N cards" (first row of the expanded body)
#   2) the "Value for League" feature input (mid)
#   3) the setMetadata section labels (bottom of the grid)
# NO centerElement: a plain scroll lands the target in the safe mid/lower
# band; centering is unnecessary for a read-only assert (no tap follows), and
# the panel is the page's last content so there's nothing below to center
# against. The danger zone here is the y>=489 FOOTER, not the top (the sticky
# header is pointer-events-none) — and footer occlusion only steals TAPS, not
# visibility, so a plain scroll is correct for these asserts.
# ============================================================

# "Will propagate to N cards" preview counter — first row of the expanded body,
# visible when feature rows exist. (Was a bare assertVisible that timed out on
# cold CI: the counter renders below the fold and assertVisible does not scroll
# — NEO-39 first-attempt fix.)
- scrollUntilVisible:
    element:
      text: ".*Will propagate to.*"
    visibilityPercentage: 10
    timeout: 7000

# At least one feature input row — the League feature is the primary
# marketplace-derived feature on Baseball sets. Its input (aria-label
# "Value for League") confirms the features list is populated from the BSC/SL
# sync. It sits below the "Will propagate to" counter, so this scrolls further
# down from the previous step.
- scrollUntilVisible:
    element:
      id: "Value for League"
    visibilityPercentage: 10
    timeout: 7000

# The setMetadata section renders at the BOTTOM of the panel grid (last, below
# the feature rows). At set level the metadata labels (Total Cards / Block /
# TCDB Set ID) always render, so the section is present in either the synced or
# empty state (not a blank screen). (Was a bare assertVisible below the fold.)
- scrollUntilVisible:
    element:
      text: ".*No set metadata yet.*|.*Released.*|.*Cards.*|.*TCDB.*|.*Block.*"
    visibilityPercentage: 10
    timeout: 7000

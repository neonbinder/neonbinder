appId: com.neonbinder.web
name: "Util — drill to a (Sport, Year, Manufacturer, Set) — accepts env overrides"
tags:
  - util
---
# Direct search-select drill for the REAL pre-synced hierarchy.
#
# DEFAULTS (canonical Topps Chrome test anchor):
#   SPORT        = "Baseball"
#   YEAR         = "2024"
#   MANUFACTURER = "Topps"
#   SET          = "Topps Chrome"
#
# CALLER OVERRIDES — pass any subset of SPORT / YEAR / MANUFACTURER / SET via
# `runFlow.env` to target a different hierarchy (must be pre-synced or this
# util will fail clearly when the search input does not appear).
#
# RETURN CONTRACT:
#   Variant Types column is visible, "Base" is listed.
#   The 60s timeout on "Base" is sanctioned — it covers the variant-type
#   auto-sync on the override / cold path (BSC + SL fetch for a non-pre-synced
#   set). On the canonical Topps Chrome path the warm data satisfies it in <7s.
#
# WHAT THIS IS NOT:
#   - This util does NOT create custom entries (no "Add custom" branch).
#   - Use util-drill-to-custom.yaml for flows that need create-or-select logic.
#
# PROVEN PATTERN: mirrors setup.yaml lines ~132-209 exactly — select-only,
# no notVisible guards, no create branches.

# ── NAVIGATE ─────────────────────────────────────────────────────────────────
- openLink: ${APP_URL || "http://localhost:3000"}/set-selector
- extendedWaitUntil:
    visible: "Set Selector"
    timeout: 20000

# ── SPORT ─────────────────────────────────────────────────────────────────────
# Baseball is seeded by setup.yaml and appears immediately — no search input at
# this level. Scroll + center before tapping (footer-steal zone rule).
# waitToSettleTimeoutMs: 0 — the subsequent extendedWaitUntil re-syncs; the
# settle dead-wait is redundant here.
- extendedWaitUntil:
    visible: ${SPORT || "Baseball"}
- scrollUntilVisible:
    element:
      text: ${SPORT || "Baseball"}
    centerElement: true
    waitToSettleTimeoutMs: 0
# NEO-85 residual coordinate-staleness: even after the write-if-changed churn fix,
# maestro-web can read a row's bounds then have the still-settling column reflow
# before the click lands stale → a false "Something changed… Proceed" that didn't
# select the row. Result-keyed retry: re-fire the row tap ONCE iff the NEXT column
# ("Years") doesn't appear; a genuine failure still fails loudly. retryTapIfNoChange
# is the maestro-native nudge (default settle re-enables it).
- retry:
    maxRetries: 1
    commands:
      - tapOn:
          text: ${SPORT || "Baseball"}
          retryTapIfNoChange: true
      - extendedWaitUntil:
          visible: "Years"

# ── YEAR ──────────────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible: ".*Search years.*"
- scrollUntilVisible:
    element:
      text: ".*Search years.*"
    centerElement: true
    waitToSettleTimeoutMs: 0
# 250ms settle on the search-box tap — input needs to be focused before inputText
# fires, and a 0ms settle can drop the first character on a reactive page.
- tapOn:
    text: ".*Search years.*"
    waitToSettleTimeoutMs: 250
- inputText: ${YEAR || "2024"}
# NEO-85 residual coordinate-staleness: result-keyed retry — re-fire the Year
# row-select ONCE iff the next column ("Manufacturers") doesn't appear.
- retry:
    maxRetries: 1
    commands:
      - tapOn:
          text: ${YEAR || "2024"}
          below:
            id: "Search years"
          retryTapIfNoChange: true
      - extendedWaitUntil:
          visible: "Manufacturers"

# ── MANUFACTURER ──────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible: ".*Search manufacturers.*"
- scrollUntilVisible:
    element:
      text: ".*Search manufacturers.*"
    centerElement: true
    waitToSettleTimeoutMs: 0
- tapOn:
    text: ".*Search manufacturers.*"
    waitToSettleTimeoutMs: 250
- inputText: ${MANUFACTURER || "Topps"}
# NEO-85 residual coordinate-staleness: result-keyed retry — re-fire the
# Manufacturer row-select ONCE iff the next column ("Sets") doesn't appear. This
# is the exact drop proven this sweep (checklist-renders-rich-fields: the "Topps"
# row-select landed stale, the column stayed expanded, "Sets" never appeared).
- retry:
    maxRetries: 1
    commands:
      - tapOn:
          text: ${MANUFACTURER || "Topps"}
          below:
            id: "Search manufacturers"
          retryTapIfNoChange: true
      - extendedWaitUntil:
          visible: "Sets"

# ── SET ───────────────────────────────────────────────────────────────────────
- extendedWaitUntil:
    visible: ".*Search sets.*"
- scrollUntilVisible:
    element:
      text: ".*Search sets.*"
    centerElement: true
    waitToSettleTimeoutMs: 0
- tapOn:
    text: ".*Search sets.*"
    waitToSettleTimeoutMs: 250
- inputText: ${SET || "Topps Chrome"}
# NEO-85 residual coordinate-staleness: result-keyed retry — re-fire the Set
# row-select ONCE iff the next column ("Variant Types") doesn't appear.
- retry:
    maxRetries: 1
    commands:
      - tapOn:
          text: ${SET || "Topps Chrome"}
          below:
            id: "Search sets"
          retryTapIfNoChange: true
      - extendedWaitUntil:
          visible: "Variant Types"

# ── RETURN CONTRACT ───────────────────────────────────────────────────────────
# The Variant Types column is confirmed by the Set retry above. "Base" appears
# after the variant-type sync completes. 60s is the sanctioned
# ceiling for override / cold paths (BSC + SL fetch); warm Topps Chrome satisfies
# this in <7s. DO NOT increase this timeout without explicit user approval.
- scrollUntilVisible:
    element:
      text: "Base"
    centerElement: true
    timeout: 60000
    waitToSettleTimeoutMs: 0
